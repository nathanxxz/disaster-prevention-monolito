{% extends "base.html" %}
{% block title %}Nova Análise de Desastre{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;margin:2rem auto;">
  <div class="card-header">➕ Nova Análise de Desastre</div>
  <form method="POST" action="{{ url_for('desastres.criarDesastre') }}">
    <div class="form-group">
      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" name="cidade" class="form-control" required maxlength="45">
    </div>
    <div class="form-group">
      <label for="estado">Estado (UF)</label>
      <input type="text" id="estado" name="estado" class="form-control" required maxlength="2" placeholder="SP">
    </div>
    <div class="form-group">
      <label for="chuva_dia">Chuva do dia (mm)</label>
      <input type="number" step="0.01" id="chuva_dia" name="chuva_dia" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="acumulado_3d">Acumulado 3 dias (mm)</label>
      <input type="number" step="0.01" id="acumulado_3d" name="acumulado_3d" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="acumulado_7d">Acumulado 7 dias (mm)</label>
      <input type="number" step="0.01" id="acumulado_7d" name="acumulado_7d" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="risco_nivel">Nível de risco</label>
      <select id="risco_nivel" name="risco_nivel" class="form-control" required>
        <option value="">Selecione...</option>
        <option value="Baixo">🟢 Baixo</option>
        <option value="Moderado">🟡 Moderado</option>
        <option value="Alto">🟠 Alto</option>
        <option value="Crítico">🔴 Crítico</option>
      </select>
    </div>
    <div class="form-group">
      <label for="risco_probabilidade">Probabilidade de risco (%)</label>
      <input type="number" step="0.01" min="0" max="100" id="risco_probabilidade" name="risco_probabilidade" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="data_analise">Data da análise</label>
      <input type="date" id="data_analise" name="data_analise" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-success" style="width:100%;">Salvar Análise</button>
  </form>
</div>
{% endblock %}
