{% extends "base.html" %}
{% block title %}Nova Análise{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>➕ Nova Análise</h1>
    <p class="subtitle">Registre dados pluviométricos e avaliação de risco</p>
  </div>
  <a href="{{ url_for('desastres.listarDesastres') }}" class="btn btn-outline">← Voltar</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('desastres.criarDesastre') }}">

    <div class="form-section">Localização</div>
    <div class="form-row">
      <div class="form-group">
        <label for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade" class="form-control" placeholder="Ex: São Paulo" required maxlength="45">
      </div>
      <div class="form-group">
        <label for="estado">Estado (UF)</label>
        <input type="text" id="estado" name="estado" class="form-control" placeholder="SP" required maxlength="2" style="text-transform:uppercase">
      </div>
    </div>

    <div class="form-section">Dados Pluviométricos</div>
    <div class="form-row">
      <div class="form-group">
        <label for="chuva_dia">Chuva do dia (mm)</label>
        <input type="number" step="0.01" id="chuva_dia" name="chuva_dia" class="form-control" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label for="data_analise">Data da análise</label>
        <input type="date" id="data_analise" name="data_analise" class="form-control" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="acumulado_3d">Acumulado 3 dias (mm)</label>
        <input type="number" step="0.01" id="acumulado_3d" name="acumulado_3d" class="form-control" placeholder="0.00" required>
      </div>
      <div class="form-group">
        <label for="acumulado_7d">Acumulado 7 dias (mm)</label>
        <input type="number" step="0.01" id="acumulado_7d" name="acumulado_7d" class="form-control" placeholder="0.00" required>
      </div>
    </div>

    <div class="form-section">Avaliação de Risco</div>
    <div class="form-row">
      <div class="form-group">
        <label for="risco_nivel">Nível de risco</label>
        <select id="risco_nivel" name="risco_nivel" class="form-control" required>
          <option value="">Selecione...</option>
          <option value="Baixo">🟢 Baixo</option>
          <option value="Moderado">🔵 Moderado</option>
          <option value="Alto">🟡 Alto</option>
          <option value="Crítico">🔴 Crítico</option>
        </select>
      </div>
      <div class="form-group">
        <label for="risco_probabilidade">Probabilidade (%)</label>
        <input type="number" step="0.01" min="0" max="100" id="risco_probabilidade" name="risco_probabilidade" class="form-control" placeholder="0 - 100" required>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar Análise</button>
      <a href="{{ url_for('desastres.listarDesastres') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
