{% extends "base.html" %}
{% block title %}Login Admin{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🔐</div>
    <h1 class="auth-title">Área Administrativa</h1>
    <p class="auth-subtitle">Faça login com suas credenciais de administrador</p>

    <form method="POST" action="{{ url_for('admin.loginUsuarioAdmin') }}">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="admin@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2">Entrar no sistema</button>
    </form>

    <p class="auth-footer">
      Não tem conta? <a href="{{ url_for('admin.criarUsuarioAdmin') }}">Cadastre-se</a>
      &nbsp;·&nbsp;
      <a href="{{ url_for('cliente.loginUsuarioCliente') }}">Login Cliente</a>
    </p>
  </div>
</div>
{% endblock %}
