{% extends "base.html" %}
{% block title %}Login Admin{% endblock %}
{% block content %}
<div class="card" style="max-width:450px;margin:2rem auto;">
  <div class="card-header">🔐 Login Administrador</div>
  <form method="POST" action="{{ url_for('admin.login_admin') }}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" placeholder="admin@email.com" required>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
  </form>
  <p class="text-center mt-2 text-muted">Não tem conta? <a href="{{ url_for('admin.cadastrar_admin') }}">Cadastre-se</a></p>
</div>
{% endblock %}
