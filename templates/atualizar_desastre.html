{% extends "base.html" %}
{% block title %}Editar Análise{% endblock %}
{% block content %}
{% if desastre %}
<div class="card" style="max-width:600px;margin:2rem auto;">
  <div class="card-header">✏️ Editar Análise #{{ desastre.id }}</div>
  <form method="POST" action="{{ url_for('desastres.atualizarDesastre', id=desastre.id) }}">
    <div class="form-group">
      <label for="cidade">Cidade</label>
      <input type="text" id="cidade" name="cidade" class="form-control" value="{{ desastre.cidade }}" required>
    </div>
    <div class="form-group">
      <label for="estado">Estado (UF)</label>
      <input type="text" id="estado" name="estado" class="form-control" value="{{ desastre.estado }}" required maxlength="2">
    </div>
    <div class="form-group">
      <label for="chuva_dia">Chuva do dia (mm)</label>
      <input type="number" step="0.01" id="chuva_dia" name="chuva_dia" class="form-control" value="{{ desastre.chuva_dia }}" required>
    </div>
    <div class="form-group">
      <label for="acumulado_3d">Acumulado 3 dias (mm)</label>
      <input type="number" step="0.01" id="acumulado_3d" name="acumulado_3d" class="form-control" value="{{ desastre.acumulado_3d }}" required>
    </div>
    <div class="form-group">
      <label for="acumulado_7d">Acumulado 7 dias (mm)</label>
      <input type="number" step="0.01" id="acumulado_7d" name="acumulado_7d" class="form-control" value="{{ desastre.acumulado_7d }}" required>
    </div>
    <div class="form-group">
      <label for="risco_nivel">Nível de risco</label>
      <select id="risco_nivel" name="risco_nivel" class="form-control" required>
        <option value="Baixo" {% if desastre.risco_nivel == 'Baixo' %}selected{% endif %}>🟢 Baixo</option>
        <option value="Moderado" {% if desastre.risco_nivel == 'Moderado' %}selected{% endif %}>🟡 Moderado</option>
        <option value="Alto" {% if desastre.risco_nivel == 'Alto' %}selected{% endif %}>🟠 Alto</option>
        <option value="Crítico" {% if desastre.risco_nivel == 'Crítico' %}selected{% endif %}>🔴 Crítico</option>
      </select>
    </div>
    <div class="form-group">
      <label for="risco_probabilidade">Probabilidade (%)</label>
      <input type="number" step="0.01" min="0" max="100" id="risco_probabilidade" name="risco_probabilidade" class="form-control" value="{{ desastre.risco_probabilidade }}" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Salvar Alterações</button>
  </form>
  <a href="{{ url_for('desastres.listarDesastres') }}" class="btn btn-outline mt-1" style="width:100%;text-align:center;">Cancelar</a>
</div>
{% else %}
<div class="card text-center">
  <p class="text-muted">Análise não encontrada.</p>
</div>
{% endif %}
{% endblock %}
