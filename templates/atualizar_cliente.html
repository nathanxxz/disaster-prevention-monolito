{% extends "base.html" %}
{% block title %}Editar Cliente{% endblock %}
{% block content %}
{% if cliente %}
<div class="card" style="max-width:500px;margin:2rem auto;">
  <div class="card-header">✏️ Editar Perfil</div>
  <form method="POST" action="{{ url_for('cliente.atualizarCliente', id=cliente.id) }}">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" class="form-control" value="{{ cliente.nome }}" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" value="{{ cliente.email }}" required>
    </div>
    <div class="form-group">
      <label for="senha">Nova senha (deixe vazio para manter)</label>
      <input type="password" id="senha" name="senha" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Salvar</button>
  </form>
</div>
{% else %}
<div class="card text-center"><p class="text-muted">Cliente não encontrado.</p></div>
{% endif %}
{% endblock %}
