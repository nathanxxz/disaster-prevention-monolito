{% extends "base.html" %}
{% block title %}Cadastro Admin{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo">📝</div>
    <h1 class="auth-title">Novo Administrador</h1>
    <p class="auth-subtitle">Preencha os dados para criar sua conta</p>

    <form method="POST" action="{{ url_for('admin.criarUsuarioAdmin') }}">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" class="form-control" placeholder="Seu nome" required maxlength="45">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="admin@email.com" required maxlength="45">
        </div>
        <div class="form-group">
          <label for="data_nascimento">Nascimento</label>
          <input type="date" id="data_nascimento" name="data_nascimento" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-2">Criar conta</button>
    </form>

    <p class="auth-footer">Já tem conta? <a href="{{ url_for('admin.loginUsuarioAdmin') }}">Fazer login</a></p>
  </div>
</div>
{% endblock %}
