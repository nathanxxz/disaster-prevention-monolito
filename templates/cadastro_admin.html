{% extends "base.html" %}
{% block title %}Cadastro Admin{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:2rem auto;">
  <div class="card-header">📝 Cadastro Administrador</div>
  <form method="POST" action="{{ url_for('admin.criarUsuarioAdmin') }}">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" class="form-control" required maxlength="45">
    </div>
    <div class="form-group">
      <label for="data_nascimento">Data de nascimento</label>
      <input type="date" id="data_nascimento" name="data_nascimento" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" required maxlength="45">
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" class="form-control" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Cadastrar</button>
  </form>
  <p class="text-center mt-2 text-muted">Já tem conta? <a href="{{ url_for('admin.loginUsuarioAdmin') }}">Faça login</a></p>
</div>
{% endblock %}
