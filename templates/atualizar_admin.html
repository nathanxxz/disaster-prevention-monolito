{% extends "base.html" %}
{% block title %}Editar Admin{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>✏️ Editar Admin</h1>
    {% if admin %}<p class="subtitle">#{{ admin.id }} — {{ admin.nome }}</p>{% endif %}
  </div>
  <a href="{{ url_for('admin.listarAdmins') }}" class="btn btn-outline">← Voltar</a>
</div>

{% if admin %}
<div class="form-card">
  <form method="POST" action="{{ url_for('admin.atualizarAdmin', id=admin.id) }}">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" class="form-control" value="{{ admin.nome }}" required>
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" class="form-control" value="{{ admin.email }}" required>
    </div>
    <div class="form-group">
      <label for="data_nascimento">Data de nascimento</label>
      <input type="date" id="data_nascimento" name="data_nascimento" class="form-control" value="{{ admin.data_nascimento }}">
    </div>
    <div class="form-section">Segurança</div>
    <div class="form-group">
      <label for="senha">Nova senha <span style="color:var(--text-muted);font-weight:400;">(deixe vazio para manter)</span></label>
      <input type="password" id="senha" name="senha" class="form-control" placeholder="••••••••">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar alterações</button>
      <a href="{{ url_for('admin.listarAdmins') }}" class="btn btn-outline">Cancelar</a>
    </div>
  </form>
</div>
{% else %}
<div class="empty-state">
  <div class="empty-icon">⚠️</div>
  <h3>Admin não encontrado</h3>
  <a href="{{ url_for('admin.listarAdmins') }}" class="btn btn-outline">← Voltar</a>
</div>
{% endif %}
{% endblock %}
