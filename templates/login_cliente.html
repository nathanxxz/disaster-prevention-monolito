{% extends "base.html" %}
{% block title %}Login Cliente{% endblock %}
{% block content %}
<div class="card" style="max-width:450px;margin:2rem auto;">
  <div class="card-header">🔐 Login Cliente</div>
  <form method="POST" action="{{ url_for('cliente.loginUsuarioCliente') }}">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" class="form-control" placeholder="cliente@email.com" required>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" class="form-control" placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
  </form>
  <p class="text-center mt-2 text-muted">Não tem conta? <a href="{{ url_for('cliente.criarUsuarioCliente') }}">Cadastre-se</a></p>
</div>
{% endblock %}
