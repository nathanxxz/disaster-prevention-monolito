{% extends "base.html" %}
{% block title %}Dashboard Admin{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Olá, {{ current_user.nome }} 👋</h1>
    <p class="subtitle">Painel de controle administrativo</p>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-icon">📊</div>
    <div class="stat-label">Análises</div>
    <div class="stat-value">Desastres</div>
    <a href="{{ url_for('desastres.listarDesastres') }}" class="btn btn-outline btn-sm">Ver todas →</a>
  </div>
  <div class="stat-card">
    <div class="stat-icon">➕</div>
    <div class="stat-label">Registrar</div>
    <div class="stat-value">Nova Análise</div>
    <a href="{{ url_for('desastres.criarDesastre') }}" class="btn btn-primary btn-sm">Criar →</a>
  </div>
  <div class="stat-card">
    <div class="stat-icon">👤</div>
    <div class="stat-label">Gestão</div>
    <div class="stat-value">Admins</div>
    <a href="{{ url_for('admin.listarAdmins') }}" class="btn btn-outline btn-sm">Gerenciar →</a>
  </div>
  <div class="stat-card">
    <div class="stat-icon">👥</div>
    <div class="stat-label">Gestão</div>
    <div class="stat-value">Clientes</div>
    <a href="{{ url_for('cliente.listarClientes') }}" class="btn btn-outline btn-sm">Gerenciar →</a>
  </div>
</div>
{% endblock %}
